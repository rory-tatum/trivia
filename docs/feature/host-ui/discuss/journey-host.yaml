feature_id: host-ui
feature_name: Host UI (Quizmaster Panel)
date: 2026-04-09
persona:
  name: Marcus
  role: Quizmaster / host
  context: Running multiplayer trivia for a group of friends in a browser; wants to focus on social engagement, not UI complexity
  motivation: Control the game session confidently without being distracted by confusing UI

journey:
  name: Run a trivia game as quizmaster
  emotional_arc:
    - phase: land
      emotion: anxiety
      description: Will my token work? Will the page connect?
    - phase: connect
      emotion: confidence
      description: I am in. I can see the controls clearly.
    - phase: load
      emotion: engagement
      description: Quiz is ready; friends can join.
    - phase: round_active
      emotion: authority
      description: I control the pace; I reveal questions when ready.
    - phase: scoring
      emotion: focus
      description: I am the judge; marking correct/wrong.
    - phase: ceremony
      emotion: engagement
      description: Everyone watches the answer walkthrough.
    - phase: game_over
      emotion: satisfaction
      description: Clear winner, great night.

steps:
  - id: step-1-land
    name: Land on host page
    trigger: Marcus navigates to /?token=HOST_SECRET
    precondition: Server is running; HOST_TOKEN env var is set
    actor: Marcus (browser)
    action: Browser loads /?token=HOST_SECRET; WsClient begins WebSocket handshake to /ws?token=HOST_SECRET
    expected_state:
      ui: Connecting spinner / status indicator
      ws: Pending handshake
    shared_artifacts_read:
      - token (from URL query param)
    error_path:
      - trigger: wrong token
        backend_response: HTTP 403 on WS upgrade
        client_signal: CloseEvent code 1006 on first attempt
        ui_outcome: Show "Connection refused — invalid token. Check HOST_TOKEN and reload."

  - id: step-2-connected
    name: Connection established
    trigger: ws.onopen fires
    precondition: Token matches HOST_TOKEN
    actor: WsClient (internal), Host.tsx
    action: WsClient calls registered onOpen handlers; Host.tsx sets connected = true
    expected_state:
      ui: Status shows "Connected"; quiz load form visible
      game_phase: idle
    shared_artifacts_produced:
      - gamePhase = idle
    notes: connected state MUST be set only inside onOpen callback, not synchronously after connect()

  - id: step-3-load-quiz
    name: Load quiz
    trigger: Marcus enters file path and clicks Load Quiz
    precondition: gamePhase = idle; connected = true
    actor: Marcus
    action: Host.tsx sends host_load_quiz with { file_path: "/path/to/quiz.yaml" }
    expected_state:
      ws_sent: host_load_quiz
    server_response:
      success: quiz_loaded event with QuizLoadedMeta
      failure: error event with code quiz_load_failed
    shared_artifacts_produced:
      - quizMeta (title, round_count, question_count, player_url, display_url, confirmation, session_id)
      - gamePhase = quiz_loaded
    ui_on_success: Show confirmation string; show "Start Round 1" button; show player/display URLs
    ui_on_failure: Show error message inline; keep form editable

  - id: step-4-start-round
    name: Start a round
    trigger: Marcus clicks Start Round N
    precondition: gamePhase = quiz_loaded OR previous round scored and published
    actor: Marcus
    action: Host.tsx sends host_start_round with { round_index: N }
    server_response:
      success: round_started broadcast to all rooms
    shared_artifacts_produced:
      - roundIndex = N
      - gamePhase = round_active
    ui_on_success: Show round panel with "Reveal Next Question" button and question counter
    error_path:
      - trigger: round_index invalid
        ui_outcome: Show inline error; remain in current phase

  - id: step-5-reveal-questions
    name: Reveal questions one by one
    trigger: Marcus clicks Reveal Next Question
    precondition: gamePhase = round_active
    actor: Marcus
    action: Host.tsx sends host_reveal_question with { round_index: N, question_index: M }
    server_response:
      success: question_revealed broadcast with question text
    shared_artifacts_produced:
      - revealedQuestions (accumulated list)
    ui_on_success: Append question to revealed list; increment counter; when all revealed show "End Round" button

  - id: step-6-end-round
    name: End round (lock answers)
    trigger: Marcus clicks End Round
    precondition: gamePhase = round_active; all questions revealed
    actor: Marcus
    action: Host.tsx sends host_end_round with { round_index: N }; then host_begin_scoring
    server_response:
      success: scoring_opened broadcast
    shared_artifacts_produced:
      - gamePhase = scoring
    ui_on_success: Transition to scoring panel showing team answers per question

  - id: step-7-score-answers
    name: Mark answers correct or wrong
    trigger: Marcus clicks Correct or Wrong for each team answer
    precondition: gamePhase = scoring
    actor: Marcus
    action: Host.tsx sends host_mark_answer with { team_id, round_index, question_index, verdict }
    server_response:
      success: score_updated sent to host room
    shared_artifacts_produced:
      - scores (running totals per team)
    ui_on_success: Update running score display for that team; button indicates verdict applied

  - id: step-8-publish-scores
    name: Publish round scores
    trigger: Marcus clicks Publish Scores
    precondition: gamePhase = scoring
    actor: Marcus
    action: Host.tsx sends host_publish_scores with { round_index: N }
    server_response:
      success: scores_published broadcast to all rooms
    shared_artifacts_produced:
      - gamePhase = ceremony (if doing answer walkthrough) OR quiz_loaded (if more rounds)
    ui_on_success: Show round scores summary; offer "Start Ceremony" or "Start Next Round"

  - id: step-9-ceremony
    name: Walk through answers on display (ceremony)
    trigger: Marcus clicks Show Next Question / Reveal Answer repeatedly
    precondition: gamePhase = ceremony
    actor: Marcus
    action: Host.tsx sends host_ceremony_show_question and host_ceremony_reveal_answer
    server_response:
      ceremony_question_shown: broadcast to display + play rooms
      ceremony_answer_revealed: broadcast to display room only
    ui_on_success: Show progress counter; enable next/reveal buttons per step

  - id: step-10-end-game
    name: End the game
    trigger: Marcus clicks End Game after final round
    precondition: All rounds complete; gamePhase allows end_game
    actor: Marcus
    action: Host.tsx sends host_end_game
    server_response:
      success: game_over broadcast with final scores to all rooms
    shared_artifacts_produced:
      - gamePhase = game_over
    ui_on_success: Show final leaderboard; game controls removed

error_paths:
  - id: err-auth
    trigger: wrong or missing token
    detection: CloseEvent.code 1006 on first connect attempt (no prior onOpen)
    ui_behavior: Show permanent "Connection refused — invalid token" message; stop retrying
  - id: err-quiz-load
    trigger: invalid file path
    detection: error event { event: "error", payload: { message: "..." } }
    ui_behavior: Inline error below load form; form remains editable
  - id: err-ws-drop
    trigger: network interruption mid-game
    detection: onClose fires after prior onOpen (not first attempt)
    ui_behavior: Show "Reconnecting..." in status; game controls remain; resume on reconnect
  - id: err-reconnect-failed
    trigger: 10 failed reconnect attempts
    detection: reconnect_failed event from WsClient
    ui_behavior: Show "Could not reconnect. Please reload." with reload button

shared_artifacts:
  - name: token
    source: URL query param ?token=
    consumers: [WsClient (auth), Host.tsx (build WS URL)]
    type: string
  - name: gamePhase
    source: Derived from WS events (onOpen, quiz_loaded, round_started, scoring_opened, game_over)
    consumers: [Host.tsx render branches]
    type: enum [idle, quiz_loaded, round_active, scoring, ceremony, game_over]
  - name: quizMeta
    source: quiz_loaded payload
    consumers: [Confirmation display, round controls, URL display]
    type: QuizLoadedMeta
  - name: roundIndex
    source: round_started payload
    consumers: [Round active panel, scoring panel, ceremony panel]
    type: number
  - name: revealedQuestions
    source: Accumulated question_revealed payloads
    consumers: [Round active panel question list]
    type: Array<{ roundIndex, questionIndex, text }>
  - name: teamAnswers
    source: Scoring panel (from server via host_begin_scoring state snapshot or per-question display)
    consumers: [Scoring panel]
    type: Array<{ teamId, teamName, questionIndex, answer }>
  - name: scores
    source: score_updated events
    consumers: [Scoring running totals, game_over leaderboard]
    type: Map<teamId, score>
  - name: playerURL
    source: quiz_loaded payload (meta.PlayerURL)
    consumers: [Idle/loaded panel URL display]
    type: string
  - name: displayURL
    source: quiz_loaded payload (meta.DisplayURL)
    consumers: [Idle/loaded panel URL display]
    type: string

integration_checkpoints:
  - id: ic-1
    description: WsClient must expose onOpen hook before Host.tsx can set connected = true correctly
    affects: [step-2-connected, err-auth]
  - id: ic-2
    description: WsClient must inspect CloseEvent.code to distinguish auth failure from transient drop
    affects: [err-auth, err-ws-drop]
  - id: ic-3
    description: host_end_round must be followed by host_begin_scoring to enter scoring phase
    affects: [step-6-end-round, step-7-score-answers]
  - id: ic-4
    description: score_updated events must include team_name for display (not just team_id)
    affects: [step-7-score-answers]
  - id: ic-5
    description: quiz_loaded payload provides playerURL and displayURL for host to share with participants
    affects: [step-3-load-quiz, step-2-connected]
